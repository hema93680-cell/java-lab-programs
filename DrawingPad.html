import java.applet.Applet;
import java.awt.Graphics;

public class DrawingPad extends Applet {

public void paint(Graphics g) {

g.drawRect(50,50,100,100);
g.drawOval(200,50,100,100);
g.drawLine(50,200,200,200);

}

}
<html>
<body>

<h2>Drawing Pad Applet</h2>

<applet code="DrawingPad.class" width="400" height="300">
</applet>

</body>
</html>
